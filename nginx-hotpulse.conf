##############################################################################
# Hotpulse — Nginx Yapılandırması
# Dosyayı VDS'e kopyala:
#   sudo cp nginx-hotpulse.conf /etc/nginx/sites-available/hotpulse
#   sudo ln -s /etc/nginx/sites-available/hotpulse /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
##############################################################################

# HTTP → HTTPS yönlendirme (Cloudflare arkasında kullanmak istemiyorsan kaldır)
server {
    listen 80;
    server_name hotpulse.me www.hotpulse.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hotpulse.me www.hotpulse.me;

    # SSL (Certbot ile doldurulur veya Cloudflare origin cert kullanılır)
    ssl_certificate     /etc/letsencrypt/live/hotpulse.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotpulse.me/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Cloudflare Gerçek IP ────────────────────────────────────────────────
    real_ip_header      CF-Connecting-IP;
    set_real_ip_from    103.21.244.0/22;
    set_real_ip_from    103.22.200.0/22;
    set_real_ip_from    103.31.4.0/22;
    set_real_ip_from    104.16.0.0/13;
    set_real_ip_from    104.24.0.0/14;
    set_real_ip_from    108.162.192.0/18;
    set_real_ip_from    131.0.72.0/22;
    set_real_ip_from    141.101.64.0/18;
    set_real_ip_from    162.158.0.0/15;
    set_real_ip_from    172.64.0.0/13;
    set_real_ip_from    173.245.48.0/20;
    set_real_ip_from    188.114.96.0/20;
    set_real_ip_from    190.93.240.0/20;
    set_real_ip_from    197.234.240.0/22;
    set_real_ip_from    198.41.128.0/17;

    # ── Yükleme boyutu ──────────────────────────────────────────────────────
    client_max_body_size    10G;          # Django chunk boyutu ile eşleş
    client_body_timeout     600s;
    client_header_timeout   60s;
    send_timeout            600s;

    # ── Gzip Sıkıştırma ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── /static/ — WhiteNoise zaten gzip + 1 yıl cache yapıyor ────────────
    # Django/Gunicorn üzerinden değil, doğrudan nginx'ten sun (çok daha hızlı)
    location /static/ {
        alias /root/hotpulse/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        access_log off;

        # WhiteNoise'un ürettiği .gz dosyalarını nginx de sunabilir
        gzip_static on;
    }

    # ── /media/ — Dosyaları Django'ya uğratmadan doğrudan sun ────────────
    location /media/ {
        alias /root/hotpulse/backend/media/;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;

        # Video dosyaları için byte-range (seek) desteği
        add_header Accept-Ranges bytes;

        # Büyük video akışı için
        sendfile       on;
        tcp_nopush     on;
        aio            on;
    }

    # ── API & Diğer — Django/Gunicorn'a ilet ───────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Büyük chunk yüklemeleri için timeout artır
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
        proxy_connect_timeout 10s;

        # Buffer — küçük API yanıtları için bellek içinde tut
        proxy_buffering         on;
        proxy_buffer_size       16k;
        proxy_buffers           8 32k;
        proxy_busy_buffers_size 64k;

        # API yanıtlarını cache'leme — Cloudflare yapıyor, nginx tekrar yapmasın
        add_header Cache-Control "no-store" always;
    }

    # ── Güvenlik başlıkları ─────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
