##############################################################################
# Hotpulse — Nginx Linux VDS Yapılandırması
# Cloudflare Full (Strict) SSL modu için optimize edilmiştir.
#
# Kurulum:
#   sudo cp nginx-hotpulse.conf /etc/nginx/sites-available/hotpulse
#   sudo ln -s /etc/nginx/sites-available/hotpulse /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare Dashboard:
#   DNS → A kaydı → Proxy: Turuncu Bulut (Proxied) ✅
#   SSL/TLS → Full (strict)
##############################################################################

# Proxy cache zonu — nginx.conf http bloğuna ekle (bu dosyanın dışında)
# proxy_cache_path /var/cache/nginx/hotpulse levels=1:2 keys_zone=anon_cache:20m max_size=500m inactive=2m use_temp_path=off;

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name hotpulse.me www.hotpulse.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hotpulse.me www.hotpulse.me;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/hotpulse.me.pem;
    ssl_certificate_key /etc/ssl/cloudflare/hotpulse.me.key;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Cloudflare Gerçek IP (IPv4 + IPv6) ──────────────────────────────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Güvenlik başlıkları ─────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options    "nosniff"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Yükleme boyutu ──────────────────────────────────────────────────────
    client_max_body_size  10G;
    client_body_timeout   600s;
    client_header_timeout 60s;
    send_timeout          600s;

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   512;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/javascript application/json application/xml
        application/manifest+json application/wasm
        image/svg+xml font/woff font/woff2;

    # ── Service Worker ───────────────────────────────────────────────────────
    location = /sw.js {
        root /root/hotpulse/backend/static;
        add_header Cache-Control    "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Pragma           "no-cache" always;
        expires    0;
        access_log off;
    }

    # ── /static/assets/ — hash'li JS/CSS bundle'ları: 1 yıl immutable ──────
    # CF-Cache-Status: HIT (public, immutable → CF agresif cache'ler)
    location /static/assets/ {
        alias      /root/hotpulse/backend/static/assets/;
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary          "Accept-Encoding"   always;
        access_log off;
        gzip_static on;
    }

    # ── /static/ — diğer statik dosyalar ────────────────────────────────────
    location /static/ {
        alias      /root/hotpulse/backend/static/;
        expires    1y;
        add_header Cache-Control "public, immutable" always;
        add_header Vary          "Accept-Encoding"   always;
        access_log off;
        gzip_static on;
    }

    # ── /media/ — kullanıcı yüklemeleri (profil, thumbnail, vb.) ────────────
    # 7 gün: içerik değişirse URL'deki timestamp/uuid değişir
    location /media/ {
        alias      /root/hotpulse/backend/media/;
        expires    7d;
        add_header Cache-Control "public, must-revalidate" always;
        add_header Accept-Ranges bytes                      always;
        sendfile   on;
        tcp_nopush on;
        aio        on;
        access_log off;
    }

    # ── Video stream — büyük byte-range istekleri ────────────────────────────
    location ~* ^/api/videos/[^/]+/stream {
        proxy_pass              http://127.0.0.1:5000;
        proxy_buffering         off;
        proxy_request_buffering off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        add_header              Cache-Control     "private, no-store" always;
    }

    # ── Dosya yükleme (mutasyona uğratan; kesinlikle cache'lenmesin) ─────────
    location /api/upload/ {
        proxy_pass              http://127.0.0.1:5000;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        client_max_body_size    10G;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        add_header              Cache-Control     "private, no-store" always;
    }

    # ── /api/ — Akıllı cache ─────────────────────────────────────────────────
    # GET + anonim → nginx proxy_cache (60s) + Cloudflare edge cache
    # GET + Authorization header → bypass → private, no-store
    # POST/PUT/PATCH/DELETE → bypass → private, no-store
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 32k;

        # Authorization header varsa veya yazma metoduysa cache'i atla
        set $skip_cache 0;
        if ($http_authorization != "") { set $skip_cache 1; }
        if ($request_method !~ ^(GET|HEAD)$) { set $skip_cache 1; }

        proxy_cache            anon_cache;
        proxy_cache_key        "$request_uri";
        proxy_cache_bypass     $skip_cache;
        proxy_no_cache         $skip_cache;
        proxy_cache_valid      200 60s;
        proxy_cache_valid      404 10s;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
        proxy_cache_lock       on;
        proxy_cache_lock_timeout 3s;
        proxy_cache_revalidate on;

        # Backend'in Cache-Control headerını geçir (override etme)
        proxy_pass_header Cache-Control;
        add_header X-Cache $upstream_cache_status;
    }

    # ── Django admin ─────────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "private, no-store" always;
    }

    # ── SPA — nginx'ten doğrudan, bilinmeyen path → index.html ─────────────
    location / {
        root      /root/hotpulse/backend/static;
        try_files $uri $uri/ /index.html;
        gzip_static on;

        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header Vary          "Accept-Encoding"           always;
            expires    0;
        }
    }
}
