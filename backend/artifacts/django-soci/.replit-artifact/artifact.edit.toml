kind = "web"
previewPath = "/"
title = "Soci - Video Streaming Platform"
version = "1.0.0"
id = "artifacts/django-soci"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 8000

[services.development]
run = "cd artifacts/django-soci && python3 manage.py migrate && python3 manage.py seed_data --env=dev 2>/dev/null; python3 manage.py runserver 0.0.0.0:8000"

[services.env]
PORT = "8000"
