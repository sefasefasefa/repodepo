<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Hotpulse</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      *{box-sizing:border-box}
      html,body{background:#0a0a0a;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
      #root:empty::before{content:'';display:block}
      #app-shell{position:fixed;inset:0;background:#0a0a0a;display:flex;z-index:9999;transition:opacity .25s}
      #app-shell.hidden{opacity:0;pointer-events:none}
      #app-shell .sidebar{width:220px;background:#111;border-right:1px solid #1a1a1a;padding:16px;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
      #app-shell .sidebar .logo{height:32px;width:100px;background:#1e1e1e;border-radius:6px;margin-bottom:8px}
      #app-shell .sidebar .nav-item{height:36px;background:#1a1a1a;border-radius:8px;animation:pulse 1.5s ease-in-out infinite}
      #app-shell .main{flex:1;padding:24px;display:flex;flex-direction:column;gap:20px;overflow:hidden}
      #app-shell .topbar{height:40px;background:#111;border-radius:10px;animation:pulse 1.5s ease-in-out infinite}
      #app-shell .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
      #app-shell .card{background:#111;border-radius:12px;overflow:hidden}
      #app-shell .card .thumb{height:150px;background:#1a1a1a;animation:pulse 1.5s ease-in-out infinite}
      #app-shell .card .info{padding:12px;display:flex;flex-direction:column;gap:8px}
      #app-shell .card .line{height:12px;background:#1a1a1a;border-radius:4px;animation:pulse 1.5s ease-in-out infinite}
      #app-shell .card .line.short{width:60%}
      @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}
      @keyframes spin{to{transform:rotate(360deg)}}
      @media(max-width:768px){#app-shell .sidebar{display:none}}
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TX5SE92CJE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TX5SE92CJE');
    </script>
  </head>
  <body>
    <div id="app-shell" aria-hidden="true">
      <div class="sidebar">
        <div class="logo"></div>
        <div class="nav-item"></div>
        <div class="nav-item" style="width:80%"></div>
        <div class="nav-item" style="width:90%"></div>
        <div class="nav-item" style="width:70%"></div>
        <div class="nav-item" style="width:85%"></div>
        <div class="nav-item" style="width:60%"></div>
      </div>
      <div class="main">
        <div class="topbar"></div>
        <div class="grid">
          <div class="card"><div class="thumb"></div><div class="info"><div class="line"></div><div class="line short"></div></div></div>
          <div class="card"><div class="thumb"></div><div class="info"><div class="line"></div><div class="line short"></div></div></div>
          <div class="card"><div class="thumb"></div><div class="info"><div class="line"></div><div class="line short"></div></div></div>
          <div class="card"><div class="thumb"></div><div class="info"><div class="line"></div><div class="line short"></div></div></div>
          <div class="card"><div class="thumb"></div><div class="info"><div class="line"></div><div class="line short"></div></div></div>
          <div class="card"><div class="thumb"></div><div class="info"><div class="line"></div><div class="line short"></div></div></div>
        </div>
      </div>
    </div>
    <div id="root"></div>

    <script>
    // ── ANLIK 18+ GATE — React parse edilmeden önce çalışır (0ms gecikme) ─────
    (function(){
      try{
        var AGE='prnhbbbb_age_verified', DENY='prnhbbbb_age_denied';
        var path=window.location.pathname;
        if(['/login','/register'].some(function(p){return path===p||path.indexOf(p+'?')===0;})) return;
        var verified=localStorage.getItem(AGE)==='1';
        var denied=localStorage.getItem(DENY)==='1';
        if(verified) return; // zaten onaylandı, skeleton göster

        var shell=document.getElementById('app-shell');
        if(!shell) return;

        var C='position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;padding:20px';

        if(denied){
          shell.innerHTML='<div style="'+C+'"><div style="text-align:center;max-width:360px">'+
            '<div style="width:64px;height:64px;background:rgba(220,38,38,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">'+
              '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'+
            '</div>'+
            '<h2 style="font-size:20px;font-weight:700;color:#fff;margin:0 0 10px">Erişim Kısıtlandı</h2>'+
            '<p style="color:#888;font-size:14px;line-height:1.6;margin:0 0 24px">Bu platform yalnızca 18 yaş ve üzeri kişilere yöneliktir. Bu siteye erişim hakkınız bulunmamaktadır.</p>'+
            '<button onclick="localStorage.removeItem(\''+DENY+'\');window.location.reload()" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer;text-decoration:underline">Yaşımı yanlış girdim, tekrar dene</button>'+
          '</div></div>';
          return;
        }

        // Pending → 18+ gate
        shell.innerHTML='<div style="'+C+'">'+
          '<div style="background:#141414;border:1px solid #2a2a2a;border-radius:20px;max-width:440px;width:100%;padding:32px;box-shadow:0 32px 64px rgba(0,0,0,.85)">'+
            '<div style="text-align:center;margin-bottom:28px">'+
              '<div style="width:56px;height:56px;background:#7c3aed;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">'+
                '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'+
              '</div>'+
              '<h1 style="font-size:22px;font-weight:700;color:#fff;margin:0 0 4px">Hotpulse</h1>'+
              '<p style="color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.12em;margin:0">18+ Platform</p>'+
            '</div>'+
            '<div style="background:rgba(120,70,0,.18);border:1px solid rgba(180,110,0,.35);border-radius:12px;padding:14px 16px;margin-bottom:22px;display:flex;gap:12px;align-items:flex-start">'+
              '<svg style="flex-shrink:0;margin-top:1px" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'+
              '<div>'+
                '<p style="color:#fde68a;font-size:13px;font-weight:600;margin:0 0 4px">Yetişkin İçerik Uyarısı</p>'+
                '<p style="color:rgba(253,230,138,.65);font-size:12px;line-height:1.5;margin:0">Bu platform, 18 yaş ve üzeri yetişkinlere yönelik içerikler barındırmaktadır. Devam etmeden önce yaşınızı doğrulamanız gerekmektedir.</p>'+
              '</div>'+
            '</div>'+
            '<p style="text-align:center;color:#fff;font-weight:600;font-size:17px;margin:0 0 20px">18 yaşında veya daha büyük müsünüz?</p>'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px">'+
              '<button id="hp-yes" style="background:#7c3aed;color:#fff;font-weight:700;padding:14px 10px;border:none;border-radius:12px;cursor:pointer;font-size:13px;line-height:1.3">Evet, 18 yaşındayım veya daha büyüğüm</button>'+
              '<button id="hp-no" style="background:#1e1e1e;color:#aaa;padding:14px 10px;border:1px solid #333;border-radius:12px;cursor:pointer;font-size:13px;line-height:1.3">Hayır, 18 yaşından küçüğüm</button>'+
            '</div>'+
            '<div style="border-top:1px solid #1f1f1f;padding-top:16px;text-align:center">'+
              '<p style="color:#555;font-size:10px;line-height:1.6;margin:0 0 4px">Giriş yaparak bu sitenin Kullanım Koşulları\'nı ve Gizlilik Politikası\'nı okuduğunuzu ve kabul ettiğinizi onaylıyorsunuz.</p>'+
              '<p style="color:#444;font-size:10px;margin:0">Bu platformda yazılı mesajlar, sesli mesajlar, arama kayıtları ve yüklenen medya içerikleri sunucuda saklanabilir.</p>'+
              '<p style="color:#3a3a3a;font-size:10px;margin:6px 0 0">© '+new Date().getFullYear()+' Hotpulse. Tüm hakları saklıdır. 18+ Platform.</p>'+
            '</div>'+
          '</div>'+
        '</div>';

        document.getElementById('hp-yes').onclick=function(){
          localStorage.setItem(AGE,'1');
          localStorage.removeItem(DENY);
          // Spinner göster, React yüklenince o kaldırır
          shell.innerHTML='<div style="position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center">'+
            '<div style="width:36px;height:36px;border-radius:50%;border:3px solid #7c3aed;border-top-color:transparent;animation:spin .7s linear infinite"></div>'+
          '</div>';
        };
        document.getElementById('hp-no').onclick=function(){
          localStorage.setItem(DENY,'1');
          localStorage.removeItem(AGE);
          window.location.reload();
        };
      }catch(e){}
    })();

    // React mount olunca app-shell'i kaldır
    (function(){
      var mo=new MutationObserver(function(){
        var root=document.getElementById('root');
        if(root&&root.firstChild){
          var shell=document.getElementById('app-shell');
          if(shell){shell.classList.add('hidden');setTimeout(function(){shell.remove();},300);}
          mo.disconnect();
        }
      });
      var r=document.getElementById('root');
      if(r) mo.observe(r,{childList:true});
    })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
