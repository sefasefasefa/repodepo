kind = "web"
previewPath = "/"
title = "Prnhbbbb - Video Streaming Platform"
version = "1.0.0"
id = "artifacts/streamvid"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22983

[services.development]
run = "pnpm --filter @workspace/streamvid run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/streamvid", "run", "build" ]
publicDir = "artifacts/streamvid/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22983"
BASE_PATH = "/"
