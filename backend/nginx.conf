# ══════════════════════════════════════════════════════════════════════════════
#  Hotpulse — Nginx Production Config
#  Stack: Cloudflare (Full Strict) → Nginx (Windows) → Waitress (127.0.0.1:8000)
#
#  Kurulum adımları:
#    1. Bu dosyayı C:\nginx\conf\nginx.conf olarak kopyala
#    2. "BURAYA_YAZ" yazan iki alias yolunu kendi proje klasörüne göre düzenle
#    3. Cloudflare Origin Certificate'ı C:\nginx\ssl\ klasörüne koy
#    4. nginx -t          → config testi
#    5. nginx             → başlat
#       nginx -s reload   → yeniden yükle
#
#  Cloudflare Dashboard:
#    SSL/TLS → Full (Strict)
#    SSL/TLS → Origin Server → Create Certificate
#      → .pem → C:\nginx\ssl\hotpulse.me.pem
#      → .key → C:\nginx\ssl\hotpulse.me.key
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Cloudflare gerçek ziyaretçi IP'sini al ───────────────────────────────
    # Kaynak: https://www.cloudflare.com/ips/
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Cloudflare kaynak IP whitelist (geo_module gerekmez) ─────────────────
    # Sadece Cloudflare edge'leri ve localhost'a izin ver;
    # doğrudan sunucu IP'sine yapılan istekleri engelle.
    geo $cloudflare_ip {
        default          0;
        127.0.0.1        1;  # localhost (test/health)
        # IPv4
        103.21.244.0/22  1;
        103.22.200.0/22  1;
        103.31.4.0/22    1;
        104.16.0.0/13    1;
        104.24.0.0/14    1;
        108.162.192.0/18 1;
        131.0.72.0/22    1;
        141.101.64.0/18  1;
        162.158.0.0/15   1;
        172.64.0.0/13    1;
        173.245.48.0/20  1;
        188.114.96.0/20  1;
        190.93.240.0/20  1;
        197.234.240.0/22 1;
        198.41.128.0/17  1;
        # IPv6
        2400:cb00::/32   1;
        2606:4700::/32   1;
        2803:f800::/32   1;
        2405:b500::/32   1;
        2405:8100::/32   1;
        2a06:98c0::/29   1;
        2c0f:f248::/32   1;
    }

    # ── Log ──────────────────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    'CF-Ray:"$http_cf_ray" CF-IP:"$http_cf_connecting_ip"';
    access_log logs/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    gzip off;  # Django GZipMiddleware zaten sıkıştırıyor

    # Video upload — 10 GB
    client_max_body_size    10240m;
    client_body_timeout     300s;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
    proxy_connect_timeout   10s;

    # ── Upstream: Waitress ────────────────────────────────────────────────────
    upstream django_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # ── Ortak proxy header bloğu ──────────────────────────────────────────────
    # (her location'da tekrar etmemek için map kullanılıyor)
    map $host $forwarded_proto { default "https"; }

    # ── HTTP → HTTPS yönlendirme ──────────────────────────────────────────────
    server {
        listen 80;
        server_name hotpulse.me www.hotpulse.me;

        # Cloudflare dışından gelen HTTP'ye 403 dön
        if ($cloudflare_ip = 0) { return 403; }

        return 301 https://hotpulse.me$request_uri;
    }

    # ── Ana HTTPS sunucu ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name hotpulse.me www.hotpulse.me;

        # Cloudflare Origin Certificate
        ssl_certificate     C:/nginx/ssl/hotpulse.me.pem;
        ssl_certificate_key C:/nginx/ssl/hotpulse.me.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Cloudflare dışından gelen istekleri engelle ───────────────────────
        if ($cloudflare_ip = 0) {
            return 403;
        }

        # www → apex yönlendirme
        if ($host = www.hotpulse.me) {
            return 301 https://hotpulse.me$request_uri;
        }

        # ── Static dosyalar — Nginx doğrudan serve eder ───────────────────────
        # !! Kendi proje yolunla değiştir !!
        location /static/ {
            alias C:/hotpulse/backend/static/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media dosyaları (kullanıcı yüklemeleri) ───────────────────────────
        # !! Kendi proje yolunla değiştir !!
        location /media/ {
            alias C:/hotpulse/backend/media/;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── API uç noktaları ──────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_buffering    off;
        }

        # ── Django Admin paneli ───────────────────────────────────────────────
        location /django-admin/ {
            proxy_pass         http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }

        # ── React SPA — tüm diğer istekler Django'ya ──────────────────────────
        location / {
            proxy_pass         http://django_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
