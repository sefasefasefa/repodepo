worker_processes  auto;
error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections 4096;
    use select;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 75;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml font/woff font/woff2;

    upstream waitress_backend {
        server 127.0.0.1:8000;
        keepalive 64;
    }

    # Cloudflare gerçek IP'leri
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/22;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    server {
        listen 80;
        listen [::]:80;
        server_name hotpulse.me www.hotpulse.me;

        client_max_body_size 10240m;
        client_body_timeout  300s;

        # Proxy ortak ayarları — server bloğunda tanımlandığı için
        # tüm location'lar miras alır, ileride location'a proxy_set_header
        # eklenirse diğer başlıklar kaybolmaz.
        proxy_http_version    1.1;
        proxy_set_header      Connection "";
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;

        # Service Worker — cache'lenmemeli
        location = /sw.js {
            root C:/Users/Administrator/Desktop/hotpulse/backend/static;
            add_header Cache-Control no-cache,no-store,must-revalidate always;
            expires 0;
        }

        # Hashed asset dosyaları — sonsuza kadar cache
        location /static/assets/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/static/assets/;
            expires 1y;
            add_header Cache-Control public,immutable always;
            access_log off;
        }

        # Diğer static dosyalar
        location /static/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/static/;
            expires 1y;
            add_header Cache-Control public,immutable always;
            access_log off;
        }

        # Kullanıcı medyası
        location /media/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/media/;
            expires 7d;
            add_header Cache-Control public,must-revalidate always;
            access_log off;
        }

        # Video stream — buffering kapalı, uzun timeout
        location ~* ^/api/videos/[^/]+/stream {
            proxy_pass              http://waitress_backend;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
        }

        # Dosya yükleme — büyük body, request buffering kapalı
        location /api/upload/ {
            proxy_pass              http://waitress_backend;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            client_max_body_size    10240m;
        }

        # REST API
        location /api/ {
            proxy_pass http://waitress_backend;
        }

        # Django admin
        location /django-admin/ {
            proxy_pass http://waitress_backend;
        }

        # SPA — index.html'i cache'leme, asset'leri nginx'ten sun
        location / {
            root      C:/Users/Administrator/Desktop/hotpulse/backend/static;
            try_files $uri $uri/ /index.html;

            location = /index.html {
                add_header Cache-Control no-cache,must-revalidate always;
                expires 0;
            }
        }
    }
}
