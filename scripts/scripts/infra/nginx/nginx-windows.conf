##############################################################################
# Hotpulse — Nginx Windows VDS Yapılandırması
# Cloudflare Full (Strict) SSL modu için optimize edilmiştir.
#
# Kopyala: C:\nginx\conf\nginx.conf
# Yenile:  nginx -s reload  (veya Windows Hizmetleri'nden yeniden başlat)
#
# Cloudflare Dashboard:
#   DNS → A kaydı → Proxy: Turuncu Bulut (Proxied) ✅
#   SSL/TLS → Full (strict)
##############################################################################

worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  logs/error.log warn;
pid        logs/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                select;   # Windows'ta epoll yok, select en stabil
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Temel TCP optimizasyonları ───────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75;
    keepalive_requests  2000;
    server_tokens       off;

    # ── Nginx dosya tanımlayıcı cache'i ─────────────────────────────────────
    open_file_cache          max=10000 inactive=60s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Gzip sıkıştırma ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   512;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain text/css text/javascript text/xml text/x-component
        application/javascript application/json application/xml
        application/manifest+json application/wasm
        image/svg+xml font/woff font/woff2;

    # ── Nginx Proxy Cache (anonim GET istekleri için RAM/disk cache) ─────────
    # Sadece Waitress'e ulaşmadan cevap vermek için kullanılır.
    # Kimlik doğrulamalı istekler (Authorization header) asla cache'lenmez.
    proxy_cache_path C:/nginx/cache
        levels=1:2
        keys_zone=anon_cache:20m
        max_size=200m
        inactive=2m
        use_temp_path=off;

    # ── Cloudflare Gerçek IP (IPv4 + IPv6) ──────────────────────────────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/22;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # ── Upstream: Waitress bağlantı havuzu ──────────────────────────────────
    upstream waitress_backend {
        server    127.0.0.1:8000;
        keepalive 64;
    }

    # ── Proxy ortak ayarlar ──────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto https;
    proxy_connect_timeout   5s;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
    proxy_buffering         on;
    proxy_buffer_size       32k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # ── Ana sunucu ───────────────────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name hotpulse.me www.hotpulse.me;

        client_max_body_size  10240m;
        client_body_timeout   300s;
        client_header_timeout 30s;
        send_timeout          300s;

        # ── Güvenlik başlıkları ─────────────────────────────────────────────
        add_header X-Frame-Options        "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options "nosniff"                         always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

        # ── Service Worker — asla cache'lenmesin ────────────────────────────
        location = /sw.js {
            root       C:/Users/Administrator/Desktop/hotpulse/backend/static;
            add_header Cache-Control          "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/"                                   always;
            add_header Pragma                 "no-cache"                            always;
            expires    0;
            access_log off;
        }

        # ── /static/assets/ — hash'li JS/CSS: 1 yıl immutable ───────────────
        # CF-Cache-Status: HIT (public, immutable → CF agresif cache'ler)
        location /static/assets/ {
            alias      C:/Users/Administrator/Desktop/hotpulse/backend/static/assets/;
            expires    1y;
            add_header Cache-Control "public, immutable" always;
            add_header Vary          "Accept-Encoding"   always;
            access_log off;
            gzip_static on;
        }

        # ── /static/ — diğer statik dosyalar ────────────────────────────────
        location /static/ {
            alias      C:/Users/Administrator/Desktop/hotpulse/backend/static/;
            expires    1y;
            add_header Cache-Control "public, immutable" always;
            add_header Vary          "Accept-Encoding"   always;
            access_log off;
            gzip_static on;
        }

        # ── Kök dosyalar (favicon, manifest, robots.txt vb.) ─────────────────
        location ~* ^/(favicon\.[a-zA-Z0-9]+|opengraph\.[a-zA-Z]+|manifest\.json|robots\.txt)$ {
            root       C:/Users/Administrator/Desktop/hotpulse/backend/static;
            expires    1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }

        # ── /media/ — kullanıcı yüklemeleri ─────────────────────────────────
        # Değişmeyen içerik (profil fotoları, video thumbnail'ları) → 7 gün
        location /media/ {
            alias      C:/Users/Administrator/Desktop/hotpulse/backend/media/;
            expires    7d;
            add_header Cache-Control "public, must-revalidate" always;
            add_header Accept-Ranges bytes                      always;
            sendfile   on;
            tcp_nopush on;
            aio        off;   # Windows'ta AIO desteklenmiyor
            access_log off;
        }

        # ── Video stream — byte-range, büyük dosya ────────────────────────────
        location ~* ^/api/videos/[^/]+/stream {
            proxy_pass              http://waitress_backend;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
            add_header              Cache-Control "private, no-store" always;
        }

        # ── Dosya yükleme (mutasyona uğratan; kesinlikle cache'lenmesin) ─────
        location /api/upload/ {
            proxy_pass              http://waitress_backend;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            client_max_body_size    10240m;
            add_header              Cache-Control "private, no-store" always;
        }

        # ── /api/ — Akıllı cache ─────────────────────────────────────────────
        # GET + anonim (Authorization header YOK) → nginx proxy_cache → Cloudflare da cache'ler
        # GET + kimlik doğrulamalı (Authorization header VAR) → bypass → private
        # POST/PUT/PATCH/DELETE → bypass → private
        location /api/ {
            proxy_pass http://waitress_backend;

            # Authorization header varsa veya yazma metoduysa cache'i atla
            set $skip_cache 0;
            if ($http_authorization != "") { set $skip_cache 1; }
            if ($request_method !~ ^(GET|HEAD)$) { set $skip_cache 1; }

            proxy_cache            anon_cache;
            proxy_cache_key        "$request_uri";
            proxy_cache_bypass     $skip_cache;
            proxy_no_cache         $skip_cache;
            proxy_cache_valid      200 60s;
            proxy_cache_valid      404 10s;
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503;
            proxy_cache_lock       on;       # Thundering herd koruması
            proxy_cache_lock_timeout 3s;
            proxy_cache_revalidate on;

            # Backend'in gönderdiği Cache-Control headerını geçir
            # (Django anonim için public/s-maxage, auth için private/no-store gönderir)
            proxy_pass_header Cache-Control;
            add_header X-Cache $upstream_cache_status;
        }

        # ── Django admin ─────────────────────────────────────────────────────
        location /django-admin/ {
            proxy_pass http://waitress_backend;
            add_header Cache-Control "private, no-store" always;
        }

        # ── SPA — nginx'ten direkt, bilinmeyen path → index.html ─────────────
        location / {
            root      C:/Users/Administrator/Desktop/hotpulse/backend/static;
            try_files $uri $uri/ /index.html;
            gzip_static on;

            location = /index.html {
                add_header Cache-Control "no-cache, must-revalidate" always;
                add_header Vary          "Accept-Encoding"           always;
                expires    0;
            }
        }
    }
}
