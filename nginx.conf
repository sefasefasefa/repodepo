# ─── Hotpulse — Nginx Config (Cloudflare + Windows) ─────────────────────────
# SSL yok — HTTPS'i Cloudflare hallediyor, nginx sadece HTTP alıyor.
#
# Kopyala:  copy nginx.conf C:\nginx\conf\nginx.conf
# Test:     C:\nginx\nginx.exe -t
# Uygula:   C:\nginx\nginx.exe -s reload
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    # Bağlantıyı açık tut — Cloudflare tekrar gelince yeni TCP yok
    keepalive_timeout  75s;
    keepalive_requests 1000;

    # Gzip — Cloudflare'e giden yanıtları sıkıştır
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/javascript image/svg+xml application/vnd.apple.mpegurl;

    # Gunicorn'a keepalive — her istek için yeni TCP bağlantısı açma
    upstream gunicorn {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # Cloudflare'in gerçek ziyaretçi IP'sini Django'ya ilet
    # (Cloudflare her zaman CF-Connecting-IP header'ı gönderir)
    map $http_cf_connecting_ip $real_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    server {
        listen      80;
        server_name hotpulse.me www.hotpulse.me;

        client_max_body_size 10g;
        client_body_timeout  300s;

        # ── Statik dosyalar — Django'ya gitmiyor, nginx doğrudan sunuyor ──────
        # Güncelle: C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/
        location /static/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Media/video ───────────────────────────────────────────────────────
        location /media/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/media/;
            expires 1h;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
        }

        # ── Video stream — büyük dosya, buffering kapalı ─────────────────────
        location ~* ^/api/videos/[0-9]+/stream {
            proxy_pass              http://gunicorn;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $real_ip;
            proxy_set_header        X-Forwarded-For   $real_ip;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        # ── Video upload ──────────────────────────────────────────────────────
        location /api/upload/ {
            proxy_pass              http://gunicorn;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host              $host;
            proxy_set_header        X-Real-IP         $real_ip;
            proxy_set_header        X-Forwarded-For   $real_ip;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            client_max_body_size    10g;
        }

        # ── Diğer her şey ─────────────────────────────────────────────────────
        location / {
            proxy_pass         http://gunicorn;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $real_ip;
            proxy_set_header   X-Forwarded-For   $real_ip;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }
    }
}
