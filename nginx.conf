# ─── Hotpulse / Soci — Nginx Production Config ───────────────────────────────
# Kopyala: /etc/nginx/sites-available/hotpulse
# Aktif et: ln -s /etc/nginx/sites-available/hotpulse /etc/nginx/sites-enabled/
# Test:     nginx -t && systemctl reload nginx
#
# Gereksinimler:
#   apt install nginx certbot python3-certbot-nginx
#   certbot --nginx -d hotpulse.me -d www.hotpulse.me
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS yönlendir
server {
    listen 80;
    listen [::]:80;
    server_name hotpulse.me www.hotpulse.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hotpulse.me www.hotpulse.me;

    # SSL (certbot doldurur)
    ssl_certificate     /etc/letsencrypt/live/hotpulse.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotpulse.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Güvenlik başlıkları
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # İstemciden yükleme limiti (video upload için 10 GB)
    client_max_body_size 10g;
    client_body_timeout  300s;

    # Nginx gzip (WhiteNoise'un önceden sıkıştırdıklarını tekrar sıkıştırmaz)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/x-javascript image/svg+xml
               application/vnd.apple.mpegurl;
    gzip_min_length 1024;

    # ── Statik dosyalar — Django yerine doğrudan nginx servis eder ───────────
    # Bu ayar Django/Gunicorn'u tamamen bypass eder → çok daha hızlı
    location /static/ {
        alias /root/hotpulse/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        # Önceden sıkıştırılmış .gz dosyaları varsa gönder
        gzip_static on;
    }

    # ── Media dosyaları — video range request desteğiyle ─────────────────────
    location /media/ {
        alias /root/hotpulse/backend/media/;
        expires 1h;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length";

        # Büyük video dosyaları için range request
        slice 1m;
        proxy_cache_key $uri$is_args$args$slice_range;
        add_header Content-Range $slice_range;
    }

    # ── Tüm diğer istekler Gunicorn'a git ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Video upload zaman aşımı
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;

        # Büyük upload için buffer'ı kapat (streaming upload)
        proxy_request_buffering off;

        # API yanıtlarını buffer'la (küçük JSON için iyi)
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── WebSocket (live yayın için) ───────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Sağlık kontrolü — nginx seviyesinde hızlı yanıt
    location = /api/healthz {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }
}
