# ─── Hotpulse / Soci — Nginx Production Config ───────────────────────────────
# Kopyala: sudo cp nginx.conf /etc/nginx/sites-available/hotpulse
# Aktif et: sudo ln -sf /etc/nginx/sites-available/hotpulse /etc/nginx/sites-enabled/hotpulse
# Test:     sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Gunicorn upstream — keepalive ile TCP bağlantıları yeniden kullanılır ────
# Bu olmadan her proxy isteği yeni TCP bağlantısı açar (VPN'de çok yavaş)
upstream gunicorn {
    server 127.0.0.1:5000;
    keepalive 32;          # Gunicorn'a 32 kalıcı bağlantı tut
}

# HTTP → HTTPS yönlendir (301 permanent)
server {
    listen 80;
    listen [::]:80;
    server_name hotpulse.me www.hotpulse.me;
    return 301 https://$host$request_uri;
}

server {
    # ── HTTP/2 — VPN/mobilde paralel istek, tek bağlantı ─────────────────────
    # "http2" yoksa ekle — en kritik değişiklik budur
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hotpulse.me www.hotpulse.me;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/hotpulse.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotpulse.me/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # TLS 1.3 = VPN'de çok daha hızlı el sıkışma (0-RTT tekrar bağlantı)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # SSL oturum önbelleği — aynı istemci tekrar gelince tam handshake yok
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;

    # ── TCP optimizasyonu ─────────────────────────────────────────────────────
    # Büyük dosyaları tek seferde gönder, küçük yanıtları bekletme
    tcp_nopush  on;
    tcp_nodelay on;
    sendfile    on;

    # Bağlantıyı açık tut — tekrar ziyarette TCP kurulumu yok
    keepalive_timeout    75s;
    keepalive_requests   1000;

    # ── İstemci yükleme limiti ────────────────────────────────────────────────
    client_max_body_size 10g;
    client_body_timeout  300s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/javascript image/svg+xml application/vnd.apple.mpegurl
        application/xml text/xml;

    # ── Güvenlik başlıkları ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Statik dosyalar — nginx doğrudan sunuyor, Django'ya gitmiyor ──────────
    location /static/ {
        alias /root/hotpulse/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;   # Önceden sıkıştırılmış .gz varsa gönder
    }

    # ── Media/video — Range request + CORS ───────────────────────────────────
    location /media/ {
        alias /root/hotpulse/backend/media/;
        expires 1h;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length";
    }

    # ── API istekleri — Gunicorn'a keepalive ile git ──────────────────────────
    location /api/ {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";          # keepalive için boş bırak
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Django admin ──────────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket — canlı yayın ───────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Video upload — büyük dosya, streaming ────────────────────────────────
    location /api/upload/ {
        proxy_pass              http://gunicorn;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;   # Streaming upload — buffer etme
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        client_max_body_size    10g;
    }

    # ── SPA + diğer her şey ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }
}
