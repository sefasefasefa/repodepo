worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    keepalive_timeout  75;
    keepalive_requests 1000;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript
               text/javascript image/svg+xml application/wasm font/woff2 application/manifest+json;

    # ── Cloudflare Gerçek IP (ziyaretçi IP'si doğru görünsün) ───────────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header CF-Connecting-IP;

    # ── Cloudflare Flexible mod: VDS sadece 80'de dinler ────────────────────
    # Ziyaretçi ↔ Cloudflare: HTTPS (Cloudflare halleder)
    # Cloudflare ↔ VDS: HTTP port 80 (sertifika gerekmez)
    server {
        listen      80;
        server_name hotpulse.me www.hotpulse.me;

        client_max_body_size 10240m;
        client_body_timeout  300s;

        # Statik dosyalar — nginx doğrudan sunar (çok daha hızlı)
        location /static/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /assets/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            gzip_static on;
        }

        location = /sw.js {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/sw.js;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            expires 0;
            access_log off;
        }

        location ~* ^/(favicon\.[a-zA-Z0-9]+|mining-worker\.js|opengraph\.[a-zA-Z]+)$ {
            root    C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/media/;
            expires 1h;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
        }

        # Video akışı
        location ~* ^/api/videos/[^/]+/stream {
            proxy_pass              http://127.0.0.1:8000;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        # Dosya yükleme
        location /api/upload/ {
            proxy_pass              http://127.0.0.1:8000;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            client_max_body_size    10240m;
        }

        # Tüm diğer istekler → Waitress
        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }

        add_header X-Frame-Options        "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    }
}
