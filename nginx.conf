# ─── Hotpulse / Soci — Nginx Windows Production Config ───────────────────────
# Windows VDS için hazırlanmıştır.
#
# Varsayılan kurulum dizini: C:\nginx\
# Config konumu:             C:\nginx\conf\nginx.conf  (veya conf.d\hotpulse.conf)
#
# SSL sertifikası:
#   Win-ACME  → genellikle C:\ProgramData\win-acme\... veya C:\nginx\ssl\
#   Certify   → genellikle C:\ProgramData\certify\...
#
# Gunicorn portu: 5000 (start.sh / hotpulse.bat içinde ayarlı)
#
# Yeniden yükle: nginx -s reload   (Komut istemi, C:\nginx\ dizininde)
# Test:          nginx -t
# ─────────────────────────────────────────────────────────────────────────────

# Gunicorn upstream — keepalive ile TCP bağlantıları yeniden kullanılır
# VPN/mobil kullanıcılarda gecikmeyi önemli ölçüde azaltır
upstream gunicorn {
    server 127.0.0.1:5000;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name hotpulse.me www.hotpulse.me;
    return 301 https://$host$request_uri;
}

server {
    # HTTP/2 — VPN ve mobil için en kritik ayar
    # Tüm JS dosyaları tek bağlantı üzerinden paralel iner
    listen 443 ssl http2;
    server_name hotpulse.me www.hotpulse.me;

    # ── SSL Sertifikası ───────────────────────────────────────────────────────
    # Kendi sertifika yolunla değiştir:
    #   Win-ACME örneği:  C:/ProgramData/win-acme/httpsacme-v02.api.letsencrypt.org/...
    #   Manuel örnek:     C:/nginx/ssl/hotpulse.me.crt
    ssl_certificate     C:/nginx/ssl/hotpulse.me.crt;
    ssl_certificate_key C:/nginx/ssl/hotpulse.me.key;

    # TLS 1.3 — VPN'de daha hızlı el sıkışma, tekrar bağlantıda sıfır RTT
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # SSL oturum önbelleği — aynı tarayıcı tekrar gelince tam handshake yok
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;

    # Bağlantıyı açık tut
    keepalive_timeout   75s;
    keepalive_requests  1000;

    client_max_body_size 10g;
    client_body_timeout  300s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip          on;
    gzip_vary     on;
    gzip_proxied  any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css application/json application/javascript
        text/javascript image/svg+xml application/vnd.apple.mpegurl;

    # ── Güvenlik başlıkları ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Statik dosyalar ───────────────────────────────────────────────────────
    # Projenin gerçek dizinine göre ayarla (forward slash kullan)
    location /static/ {
        alias C:/hotpulse/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Media/video ───────────────────────────────────────────────────────────
    location /media/ {
        alias C:/hotpulse/backend/media/;
        expires 1h;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Expose-Headers "Content-Range, Accept-Ranges, Content-Length";
    }

    # ── API ───────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Video upload ──────────────────────────────────────────────────────────
    location /api/upload/ {
        proxy_pass              http://gunicorn;
        proxy_http_version      1.1;
        proxy_set_header        Connection "";
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        client_max_body_size    10g;
    }

    # ── Django admin ──────────────────────────────────────────────────────────
    location /django-admin/ {
        proxy_pass       http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── SPA + diğer ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }
}
