##############################################################################
# Hotpulse — Nginx Windows VDS Yapılandırması (Cloudflare Flexible)
# Kopyala: C:\nginx\conf\nginx.conf
# Yenile: nginx -s reload
##############################################################################

worker_processes  auto;

# Her worker daha fazla bağlantı açabilsin
worker_rlimit_nofile 65535;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 select;   # Windows'ta epoll yok, select en stabil
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Temel TCP optimizasyonları ───────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;

    # ── Nginx dosya tanımlayıcı cache'i ─────────────────────────────────────
    # Disk'ten her seferinde açmak yerine handle'ları bellekte tut
    open_file_cache          max=10000 inactive=60s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ── Gzip sıkıştırma ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;          # 6→5: CPU tasarrufu, boyut farkı %1'den az
    gzip_min_length   512;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        text/x-component
        application/javascript
        application/json
        application/xml
        application/manifest+json
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ── Cloudflare Gerçek IP ─────────────────────────────────────────────────
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    real_ip_header   CF-Connecting-IP;

    # ── Upstream: Waitress bağlantı havuzu ──────────────────────────────────
    # Her istek için yeni TCP bağlantısı açmak yerine mevcut bağlantıları
    # yeniden kullan → Waitress'e TTFB ~20-40ms düşer
    upstream waitress_backend {
        server 127.0.0.1:8000;
        keepalive 32;             # havuzda bekleyen bağlantı sayısı
    }

    # ── Proxy ortak ayarlar ──────────────────────────────────────────────────
    proxy_http_version      1.1;
    proxy_set_header        Connection        "";   # keepalive için boş bırak
    proxy_set_header        Host              $host;
    proxy_set_header        X-Real-IP         $remote_addr;
    proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header        X-Forwarded-Proto https;
    proxy_connect_timeout   5s;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
    proxy_buffering         on;
    proxy_buffer_size       32k;
    proxy_buffers           8 32k;
    proxy_busy_buffers_size 64k;

    # ── Ana sunucu ───────────────────────────────────────────────────────────
    server {
        listen      80;
        server_name hotpulse.me www.hotpulse.me;

        client_max_body_size    10240m;
        client_body_timeout     300s;
        client_header_timeout   30s;
        send_timeout            300s;

        # Güvenlik başlıkları
        add_header X-Frame-Options        "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options "nosniff"                      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── /static/ — immutable, 1 yıl cache ──────────────────────────────
        location /static/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary          "Accept-Encoding";
            access_log off;
            gzip_static on;
        }

        # ── /assets/ — JS/CSS bundle'ları (hash'li dosya adları) ────────────
        location /assets/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary          "Accept-Encoding";
            access_log off;
            gzip_static on;
        }

        # ── Service Worker — asla cache'lenmesin ────────────────────────────
        location = /sw.js {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/sw.js;
            add_header Cache-Control    "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            expires 0;
            access_log off;
        }

        # ── Kök dosyalar (favicon, manifest, mining worker) ─────────────────
        location ~* ^/(favicon\.[a-zA-Z0-9]+|mining-worker\.js|opengraph\.[a-zA-Z]+|manifest\.json|robots\.txt)$ {
            root    C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── /media/ — kullanıcı yüklemeleri ─────────────────────────────────
        location /media/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/media/;
            expires 1h;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
            sendfile      on;
            tcp_nopush    on;
            aio           off;   # Windows'ta AIO desteklenmiyor
            access_log    off;
        }

        # ── Video stream — büyük byte-range istekleri ────────────────────────
        location ~* ^/api/videos/[^/]+/stream {
            proxy_pass              http://waitress_backend;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        # ── Dosya yükleme ───────────────────────────────────────────────────
        location /api/upload/ {
            proxy_pass              http://waitress_backend;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            client_max_body_size    10240m;
        }

        # ── API — Waitress'e ilet, Cloudflare cache etmesin ─────────────────
        location /api/ {
            proxy_pass  http://waitress_backend;
            add_header  Cache-Control "private, no-store" always;
        }

        # ── Django admin ─────────────────────────────────────────────────────
        location /django-admin/ {
            proxy_pass  http://waitress_backend;
            add_header  Cache-Control "private, no-store" always;
        }

        # ── SPA — index.html'i DOĞRUDAN nginx'ten sun ───────────────────────
        # Python/Waitress'e hiç gitme → TTFB 200-400ms → <10ms
        # Bilinmeyen yollar: önce statik dosyayı ara, yoksa index.html dön
        location / {
            root       C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles;
            try_files  $uri $uri/ /index.html;

            # index.html: Cloudflare edge'de cache'lenmesin (kişiselleşmiş içerik)
            # Tarayıcı her seferinde kontrol etsin ama koşullu GET kullanabilir
            location = /index.html {
                add_header Cache-Control "no-cache, must-revalidate";
                add_header Vary          "Accept-Encoding";
                expires    0;
            }
        }
    }
}
