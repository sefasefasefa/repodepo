worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      mime.types;
    default_type application/octet-stream;

    keepalive_timeout  75;
    keepalive_requests 1000;

    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/x-javascript
               text/javascript image/svg+xml application/wasm font/woff2 application/manifest+json;

    server {
        listen      80;
        server_name hotpulse.me www.hotpulse.me;

        client_max_body_size 10240m;
        client_body_timeout  300s;

        # ── Statik dosyalar: nginx doğrudan sunar, Gunicorn'a düşmez ────────────

        location /static/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # JS/CSS bundle'lar — hash'li, 1 yıl cache, Cloudflare CDN'e de cache edilir
        location /assets/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
            access_log off;
            gzip_static on;
        }

        # Service Worker: asla cache'lenmemeli — tarayıcı her seferinde taze almalı
        location = /sw.js {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles/sw.js;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            expires 0;
            access_log off;
        }

        # Kök seviyesi statik dosyalar
        location ~* ^/(favicon\.[a-zA-Z0-9]+|mining-worker\.js|opengraph\.[a-zA-Z]+)$ {
            root    C:/Users/Administrator/Desktop/hotpulse/backend/staticfiles;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /media/ {
            alias   C:/Users/Administrator/Desktop/hotpulse/backend/media/;
            expires 1h;
            add_header Cache-Control "public";
            add_header Accept-Ranges bytes;
        }

        location ~* ^/api/videos/[0-9]+/stream {
            proxy_pass              http://127.0.0.1:8000;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $http_cf_connecting_ip;
            proxy_set_header        X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        location /api/upload/ {
            proxy_pass              http://127.0.0.1:8000;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $http_cf_connecting_ip;
            proxy_set_header        X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header        X-Forwarded-Proto https;
            proxy_request_buffering off;
            proxy_read_timeout      600s;
            proxy_send_timeout      600s;
            client_max_body_size    10240m;
        }

        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $http_cf_connecting_ip;
            proxy_set_header   X-Forwarded-For $http_cf_connecting_ip;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
        }
    }
}
